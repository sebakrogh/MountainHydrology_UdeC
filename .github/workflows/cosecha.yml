name: Cosechador Historico Valle Hermoso

on:
  schedule:
    # Se ejecuta de forma automática todos los días a las 04:00 AM UTC (00:00 AM hora de Chile)
    - cron: '0 4 * * *'
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la pestaña "Actions" de GitHub

jobs:
  cosechar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas gspread google-oauth2-service-account

    - name: Ejecutar script de cosecha
      env:
        ZENTRA_TOKEN: ${{ secrets.ZENTRA_TOKEN }}
        DEVICE_SN: ${{ secrets.DEVICE_SN }}
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
      run: python cosechador.py
